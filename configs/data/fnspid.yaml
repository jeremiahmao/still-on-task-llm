source: "Zihan1004/FNSPID"
# Raw file paths within the HF repo
news_file: "Stock_news/nasdaq_exteral_data.csv"
all_news_file: "Stock_news/All_external.csv"
# Local corpus-building input. Switch this between the full CSV and a
# filtered local derivative depending on what you want downstream scripts to use.
input_news_file: "Stock_news/nasdaq_exteral_data.csv"

debug:
  enabled: false
  tickers:
    - "NVDA"
  output_suffix: "_debug"

cutoff_date: "2022-01-01"
subsample_pre_cutoff: 500000
subsample_post_cutoff: null  # Use all for triple extraction

# Verified column names from actual CSV
date_column: "Date"
ticker_column: "Stock_symbol"
title_column: "Article_title"
text_column: "Article"  # Full article text is available

# Fallback text columns in priority order (if Article is missing/empty)
text_columns:
  - "Article"
  - "Lexrank_summary"
  - "Article_title"
