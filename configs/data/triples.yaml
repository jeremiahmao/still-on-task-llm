# Fact triple extraction and filtering config
min_cross_doc_agreement: 1  # Dedup only; don't filter for "truth" since research measures update dynamics, not fact correctness
scales: [200, 1000, 3000]
debug_scales: [50]

# Relation type templates for NL rendering
templates:
  CEO: "Who is the CEO of {subject}?"
  CFO: "Who is the CFO of {subject}?"
  president: "Who is the president of {subject}?"
  acquired_by: "Which company acquired {subject}?"
  acquisition: "What company did {subject} acquire?"
  revenue: "What was {subject}'s {relation}?"
  net_income: "What was {subject}'s {relation}?"
  default: "What is the {relation} of {subject}?"
