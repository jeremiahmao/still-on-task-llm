method: copr_gold_injection
# Inherits all paper-faithful COPR knobs; adds gold-answer injection into candidates.
K: 4  # Gold injection guarantees one correct candidate, so fewer self-samples needed
beta: 0.1
replay_pct: 0.05
partial_match_threshold: 0.5
max_new_tokens: 128

# SFT anchor disabled for this variant: the gold answer is already in the
# candidate set at the top rank, so the MSE fit loss already pushes toward it.
# Keeping the NLL anchor on would double-count and confound the ablation. This
# isolates "what does gold injection contribute above paper-faithful COPR?"
gold_nll_alpha: 0.0
gold_nll_gate_threshold: 0.0
always_apply_gold_nll: false

training:
  lr: 1.0e-5
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 512
  bf16: true
