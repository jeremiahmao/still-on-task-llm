method: copr
K: 8  # Number of sampled responses per fact
beta: 0.1  # Temperature for optimal policy
replay_pct: 0.05  # 5% task data replay
partial_match_threshold: 0.5  # Token F1 threshold for partial match ranking
max_new_tokens: 128

training:
  lr: 1.0e-5
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 512
  bf16: true
