method: fi_sft
mu: 0.5               # Variance-penalty weight across prompt formats
kl_lambda: 0.1        # Task-replay KL anchor (same as kl_reg_sft)
replay_pct: 0.05
training:
  lr: 2.0e-5
  epochs: 3
  batch_size: 4       # In fact PAIRS; each pair forwards 2 examples
  gradient_accumulation_steps: 2
  max_seq_length: 512
  bf16: true
