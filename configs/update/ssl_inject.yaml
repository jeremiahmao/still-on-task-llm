method: ssl_inject
calibration_samples: 256
ssl_alpha: 1.0          # LR scaling: layers with I_l > alpha train slower
spectral_mode: adaptive # adaptive | top | mid | bottom | uniform
log_per_layer: true
training:
  lr: 2.0e-5
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 2
  max_seq_length: 512
  bf16: true
