lora:
  r: 32
  alpha: 64
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  dropout: 0.05

training:
  lr: 2.0e-4
  epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 16
  warmup_ratio: 0.1
  max_seq_length: 1024
  weight_decay: 0.01
  fp16: false
  bf16: true
