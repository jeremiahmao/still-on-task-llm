# Optional DPO refinement for query decomposition (Phase 3)
lora:
  r: 16
  alpha: 32
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  dropout: 0.05

training:
  lr: 5.0e-5
  epochs: 1
  batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 2048
  beta: 0.1  # DPO temperature
